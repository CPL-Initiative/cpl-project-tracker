name: "Secret scan"

# Pre-merge secret-detection scan via TruffleHog. Catches accidentally-
# committed credentials before they land on main. Free for org repos (the
# gitleaks-action started requiring a paid license for orgs in v8.20+, so
# we switched).
#
# `--results=verified` runs each candidate finding through a live-verification
# check against the issuing service — so the embedded Supabase ANON keys
# in unified_courses.js / canonical_subj4.js / pipeline.js (public by
# design, gated by Row-Level Security) won't false-positive: they're real
# JWTs that fail the "is this an active write-privileged secret?" check.
# (The older `--only-verified` flag was deprecated; using the recommended
# form from the trufflesecurity/trufflehog README.)
#
# Defense-in-depth alongside GitHub's built-in secret scanning + push
# protection (free for public repos, runs on push not pre-merge).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so PR diff scans cover every commit, not just the tip.
          fetch-depth: 0

      - name: Scan for verified secrets
        uses: trufflesecurity/trufflehog@v3.82.13
        with:
          # On a pull_request event, scan only commits introduced by the PR
          # (base..head); on push to main, scan the full repo. The action
          # auto-detects this based on the workflow trigger context.
          extra_args: --results=verified --no-update
