name: "Secret scan"

# Post-merge secret-detection scan via TruffleHog. Catches accidentally-
# committed credentials after they land on main (defense-in-depth alongside
# GitHub's built-in secret scanning + push protection — both free for
# public repos, both run on push).
#
# `--results=verified` runs each candidate finding through a live-verification
# check against the issuing service — so the embedded Supabase ANON keys
# in unified_courses.js / canonical_subj4.js / pipeline.js (public by
# design, gated by Row-Level Security) won't false-positive: they're real
# JWTs that fail the "is this an active write-privileged secret?" check.
# (The older `--only-verified` flag was deprecated; using the recommended
# form from the trufflesecurity/trufflehog README.)
#
# PR-trigger TEMPORARILY DISABLED (2026-05-26) alongside the CodeQL PR
# trigger while the EACR Phase 4 re-pivot is in flight. Push-to-main +
# workflow_dispatch stay so post-merge scans + manual runs still work. If
# a secret leak does land, GitHub's push-protection + the post-merge scan
# here are the two backstops — investigate immediately if either fires.
# Restore the `pull_request:` trigger when the re-pivot lands (PR-C2 merged).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history so PR diff scans cover every commit, not just the tip.
          fetch-depth: 0

      - name: Scan for verified secrets
        # @main per the trufflesecurity/trufflehog README. (Tried pinning
        # to v3.82.13 — that tag doesn't exist; latest is v3.95.x. Dependabot
        # can still bump @main weekly.)
        uses: trufflesecurity/trufflehog@main
        with:
          # Matches the README's recommended config verbatim. On
          # pull_request the action scans base..head; on push it scans the
          # commits in the push.
          extra_args: --results=verified,unknown
