name: Daily CPL Dashboard

on:
  schedule:
    - cron: '17 10 * * *'   # 2:17 AM PST / 3:17 AM PDT (GitHub uses UTC, no DST)
  workflow_dispatch:         # allow manual trigger from GitHub UI

concurrency:
  group: daily-dashboard
  cancel-in-progress: false

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        # Pinned in requirements.txt; Dependabot proposes bumps via
        # .github/dependabot.yml. Run a PR's CI before merging a bump.
        run: pip install -r requirements.txt

      # ── Step 1: Fetch CustomReport JSON ─────────────────────────
      - name: Fetch CustomReport from MAP API
        run: |
          python fetch_custom_report.py --output CustomReport_latest.json \
            && echo "CUSTOM_REPORT_STATUS=success" >> "$GITHUB_ENV" \
            || echo "CUSTOM_REPORT_STATUS=fallback" >> "$GITHUB_ENV"

      # ── Step 2: Scrape live metrics ──────────────────────────────
      - name: Scrape live metrics from Cloudflare Worker
        env:
          CPL_SCRAPE_SECRET: ${{ secrets.CPL_SCRAPE_SECRET }}
        run: |
          curl -s "https://cpl-proxy.slee-548.workers.dev/scrape?secret=${CPL_SCRAPE_SECRET}" \
            -o live_metrics_new.json
          python3 - <<'EOF'
          import json, shutil, sys
          try:
              d = json.load(open('live_metrics_new.json'))
              assert 'scraped_at' in d and 'metrics' in d and 'raw' in d
              shutil.move('live_metrics_new.json', 'live_metrics.json')
              print(f"Live metrics updated: {d['scraped_at']}")
              open('/tmp/metrics_status', 'w').write('success')
          except Exception as e:
              print(f"Scrape failed ({e}) — using existing live_metrics.json")
              open('/tmp/metrics_status', 'w').write('fallback')
          EOF
          echo "LIVE_METRICS_STATUS=$(cat /tmp/metrics_status)" >> "$GITHUB_ENV"

      # ── Step 3: Sync curation overlay from Supabase ──────────────
      # Folds reviewer discipline edits (public.kb_curation) into the
      # git-canonical kb/coci_curation.json so the pipeline below bakes them
      # into the dataset + export. Skips gracefully until the secret is set.
      - name: Sync curation overlay from Supabase
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -n "${SUPABASE_SERVICE_KEY:-}" ]; then
            python kb/_apply_curation.py
            # Phase 1e: fold Canonical SUBJ4 curator edits (synthesized
            # _CANON_SUBJ4::<discipline> keys) into kb/discipline_canonical_subj4.json.
            # Skipped gracefully if the seed file doesn't exist yet.
            if [ -f kb/discipline_canonical_subj4.json ]; then
              python kb/_apply_canonical_subj4.py || echo "Canonical SUBJ4 sync failed — non-fatal"
            fi
            # Cred-Ref PR-5a: fold credential-review curator edits
            # (_CREDENTIAL_REVIEW::<unified_title> rows) into the git-canonical
            # overlay at kb/credential_review_overlay.json. The dashboard reads
            # Supabase live; this script keeps the overlay in git for audit +
            # non-dashboard consumers. unified_title renames are RECORDED but
            # not applied — see Cred-Ref PR-5b for rename promotion.
            python kb/_apply_credential_review.py || echo "Credential review sync failed — non-fatal"
          else
            echo "SUPABASE_SERVICE_KEY not set — skipping curation sync."
          fi

      # ── Step 4: Run pipeline ─────────────────────────────────────
      - name: Run dashboard pipeline
        run: python excel_to_dashboard.py

      # ── Step 4b: Re-run row Trust-Card auditor ────────────────────
      # Read-only over kb/coci_*.json; writes kb/row_audit/{latest.json,
      # <date>.md} that the UCL "⚠ hinky" badge consumes. See CLAUDE.md §11.
      # Failure is non-fatal (auditor output is a UI enhancement, not load-
      # bearing for the dashboard itself).
      - name: Run row Trust-Card auditor
        run: python3 kb/_row_audit.py || echo "Auditor failed — UCL hinky chips will use prior latest.json"

      # ── Step 4c: Cred-Ref PR-5b/0 — credential rename dry-run ─────
      # Read-only over kb/credential_review_overlay.json (synced from Supabase
      # at step 3); writes kb/cred_rename_dryrun/{report.md, alias_map.json,
      # collisions.json}. Mode B preview — projects unified_title_override
      # curator entries onto the post-rename state, surfaces collisions +
      # apply-gate status. Does NOT apply renames; apply is Cred-Ref PR-5b/1,
      # manual workflow_dispatch only. Failure is non-fatal.
      - name: Run credential rename dry-run
        run: python3 kb/_cred_rename_dryrun.py || echo "Credential rename dry-run failed — non-fatal"

      # ── Step 5: Prepare GitHub Pages entry point ─────────────────
      - name: Copy dashboard to index.html
        run: cp CPL_Dashboard.html index.html

      # ── Step 6: Commit and push ───────────────────────────────────
      - name: Commit and push to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html CPL_Dashboard.html CPL_Data.js \
                  live_metrics.json kpi_history.json statewide_data.js \
                  college_activity.js college_activity_template.html \
                  kb/coci_curation.json unified_courses_data.js \
                  unified_courses_index.js unified_courses_details.js \
                  unified_courses_standalone.js unified_courses_members.js \
                  unified_courses_member_desc.js \
                  unified_courses_suggestions.js \
                  credential_reference_data.js \
                  kb/row_audit/latest.json kb/row_audit/*.md \
                  exports/unified_courses.xlsx
          # Phase 1e canonical SUBJ4 seed + curator-edit overlay (added 5a)
          git add kb/discipline_canonical_subj4.json 2>/dev/null || true
          # Cred-Ref PR-5a: credential-review curator-edit overlay
          git add kb/credential_review_overlay.json 2>/dev/null || true
          # Cred-Ref PR-5b/0: credential rename dry-run artifacts (Mode B preview)
          git add kb/cred_rename_dryrun/report.md \
                  kb/cred_rename_dryrun/alias_map.json \
                  kb/cred_rename_dryrun/collisions.json 2>/dev/null || true
          # Only add CustomReport if it was freshly fetched
          git add CustomReport_latest.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Daily dashboard update — $(date +%Y-%m-%d)"
          # Retry push with rebase on non-fast-forward (handles concurrent pushes to main)
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed — rebasing onto origin/main and retrying."
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            sleep $((attempt * 2))
          done
          echo "Push failed after 5 attempts."
          exit 1

      - name: Summary
        run: |
          echo "### CPL Dashboard Update — $(date +%Y-%m-%d)" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| CustomReport | $CUSTOM_REPORT_STATUS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Live metrics | $LIVE_METRICS_STATUS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dashboard URL | https://cpl-initiative.github.io/cpl-project-tracker/ |" >> "$GITHUB_STEP_SUMMARY"
